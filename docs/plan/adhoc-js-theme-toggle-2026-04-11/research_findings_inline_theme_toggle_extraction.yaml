plan_id: adhoc-js-theme-toggle-2026-04-11
objective: "Confirm current inline homepage theme-toggle script and map exact safe extraction to external JS without behavior change."
focus_area: inline_theme_toggle_extraction
created_at: "2026-04-11"
created_by: gem-researcher
status: completed

tldr: |
  - `index.html` currently contains an inline IIFE that drives theme toggle state, localStorage persistence, and ARIA updates (source: index.html:57-104).
  - Current behavior contract is: default light fallback, valid stored values only (`light|dark`), `data-home-theme` attribute on `.home-page`, and click-based toggle persistence (source: index.html:67-102).
  - CSS already consumes `data-home-theme='dark'` for icon swap, token overrides, and button dark styling, so extraction can be JS-file-only if execution order is preserved (source: style.css:128-133, style.css:180-203).
  - Safe no-regression extraction is to move the exact script body into an external file and replace inline block with one deferred script include placed at same DOM position before `</body>` (source: index.html:57-105).

