plan_id: adhoc-js-theme-toggle-2026-04-11
objective: "Migrate homepage theme toggle from CSS-only checkbox mechanics to JavaScript-driven behavior with default light mode, icon swap, and homepage-scoped non-regressing styles."
created_at: "2026-04-11"
created_by: gem-planner
status: completed
research_confidence: high

plan_metrics:
  wave_1_task_count: 1
  total_dependencies: 1
  risk_score: medium

tldr: |
  - Current homepage theming is CSS-only via `.home-theme-toggle-input` checked selectors and sibling combinators, with markup in `index.html` and behavior styles in `style.css` (source: index.html:10-17, style.css:92-226).
  - Safe migration requires removing CSS-only toggle blocks, preserving shared homepage theme tokens, and replacing state control with JS while keeping default light mode on load (source: docs/plan/adhoc-theme-toggle-2026-04-11/research_findings_theme_toggle_inventory.yaml).
  - Homepage scoping under `.home-page` must be preserved to avoid profile regressions because `style.css` is shared across profile pages (source: AGENTS.md:3, style.css:75-360, Myhal_Yurii/Myhal.html, Matvii_Kovalov/Kovalov.html, Sviatoslav_Lylo/Sviatoslav.html).
  - Execution is constrained to minimal implementation files (`index.html`, `style.css`) plus a concise docs sync artifact (source: user request; .github/copilot-instructions.md).

open_questions: []

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "JS toggle initializes too late or with wrong default, causing flash of incorrect theme or unexpected dark-first rendering."
      likelihood: medium
      impact: high
      mitigation: "Keep CSS default tokens as light theme, and have JS set explicit `data-home-theme=light` at startup before attaching click handlers."
    - scenario: "Removing CSS-only selectors accidentally drops required visual styles for the top-right control or homepage token consumption."
      likelihood: medium
      impact: medium
      mitigation: "Remove only checkbox-specific selector blocks, retain reusable `.home-theme-toggle-label`, icon base styles, and `.home-shell` token consumers."
    - scenario: "Homepage theme selectors lose `.home-page` scoping and leak into profile pages that reuse shared classes."
      likelihood: medium
      impact: high
      mitigation: "Require all new/updated theme selectors to remain prefixed by `.home-page`; verify all profile pages manually after changes."
    - scenario: "Icon state or accessibility attributes drift from actual mode, confusing users and screen readers."
      likelihood: medium
      impact: medium
      mitigation: "On every state change, update icon visibility, `aria-label`, and accessible text in one JS function with deterministic mapping."
  assumptions:
    - "Inline script in `index.html` is acceptable within project constraints because stack is plain HTML/CSS/JS and no build tooling is used (source: .github/copilot-instructions.md)."
    - "Theme preference persistence across page reload is expected for JS migration and can use localStorage with strict `light|dark` validation (source: research_findings_theme_toggle_inventory.yaml: approach/domain_security_considerations)."
    - "Only homepage requires toggle behavior; profile pages keep existing behavior and are non-goal for theme interaction (source: user request; AGENTS.md:3)."

implementation_specification:
  code_structure: "Keep all behavior in `index.html` and `style.css`: replace checkbox-driven toggle markup with one top-right button control, add a small inline script for initialization/click handling/localStorage validation, and convert dark-mode CSS trigger from `:checked` sibling selectors to a homepage-scoped body data-attribute hook."
  affected_areas:
    - "index.html"
    - "style.css"
    - "docs/plan/adhoc-js-theme-toggle-2026-04-11/"
  component_details:
    - component: "Homepage toggle control markup"
      responsibility: "Expose one top-right button with sun icon in light mode and moon icon in dark mode, plus Ukrainian accessible label text."
      interfaces:
        - "Button element with stable class hook for styling and JS binding"
        - "Sun and moon icon spans toggled by JS"
        - "Accessible name/state text synchronized with current mode"
    - component: "Homepage theme style layer"
      responsibility: "Retain required visual styles and token consumers while removing checkbox-only rules and enabling JS-driven dark mode selector."
      interfaces:
        - "`.home-page`-scoped light token defaults on `.home-shell`"
        - "`.home-page[data-home-theme='dark'] .home-shell` (or equivalent scoped hook) for dark token overrides"
        - "Top-right button visuals for both light/dark states"
    - component: "Homepage theme controller script"
      responsibility: "Set default light theme on load, restore valid stored preference, update icon/button state, and toggle theme on click."
      interfaces:
        - "Read/write localStorage key with strict allowed values"
        - "Apply/remove homepage theme data attribute"
        - "Single render/update function for icon + labels"
  dependencies:
    - component: "Homepage toggle control markup"
      relationship: "Provides DOM nodes consumed by JS controller and CSS styles."
    - component: "Homepage theme style layer"
      relationship: "Consumes homepage data-attribute state written by JS controller."
    - component: "Homepage theme controller script"
      relationship: "Depends on stable markup hooks and updates state consumed by styles."
  integration_points:
    - "`index.html` body currently has `class='home-page'`; keep this as the root scope anchor for all new behavior and selectors (source: index.html:9)."
    - "`style.css` currently contains checkbox-only selectors at style.css:92-100, 124-127, 134-156, 202-226, 349-352 that should be removed or replaced minimally (source: research_findings_theme_toggle_inventory.yaml)."
    - "Homepage content sections and profile links must remain unchanged functionally (source: index.html:18-58)."

