tasks:
  - id: T1
    title: "Implement JS-driven homepage theme toggle migration in minimal files"
    description: |
      Replace the current CSS-only checkbox toggle with a JavaScript-controlled top-right button on the homepage.
      Remove previously added checkbox-only toggle markup and CSS blocks to save space, keeping only styles still needed
      for button layout, icon rendering, homepage theme tokens, and scoped visual consistency.
      Ensure startup defaults to light mode, button shows sun in light mode and moon in dark mode,
      clicking toggles theme + icon + accessible label, and theme state is applied through `.home-page`-scoped hooks only.
      Keep implementation limited to `index.html` and `style.css`.
    wave: 1
    agent: gem-implementer
    prototype: false
    covers:
      - "AC-1 remove CSS-only toggle code"
      - "AC-2 keep only required styles"
      - "AC-3 default light theme on load"
      - "AC-4 top-right sun/moon icon behavior"
      - "AC-5 click toggles themes"
      - "AC-6 homepage scoping and profile non-regression"
      - "AC-7 minimal implementation files"
    priority: high
    status: completed
    dependencies: []
    conflicts_with: []
    context_files:
