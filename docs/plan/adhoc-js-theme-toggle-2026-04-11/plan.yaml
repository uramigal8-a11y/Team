    failure_modes:
      - scenario: "Residual CSS-only selectors conflict with JS state selector, causing inconsistent dark-mode activation."
        likelihood: medium
        impact: high
        mitigation: "Search and remove all `home-theme-toggle-input`-driven selectors and verify dark mode relies on one state hook."
      - scenario: "State initialization runs after paint and visually flickers between themes."
        likelihood: medium
        impact: medium
        mitigation: "Apply initial state at script start and keep CSS default as light."
      - scenario: "Profile pages inherit unintended style changes due to selector broadening."
        likelihood: medium
        impact: high
        mitigation: "Constrain all new selectors to `.home-page` and run manual profile-page regression checks."

