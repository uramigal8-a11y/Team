        description: "Contains current checkbox toggle markup and homepage structure to preserve."
      - path: style.css
        description: "Contains current checkbox selectors and homepage-scoped theme token system."
      - path: AGENTS.md
        description: "Defines mandatory `.home-page` scoping to avoid profile regressions."
    verification:
      - "Load homepage with cleared storage key and confirm light theme is applied by default."
      - "Verify top-right button shows sun in light mode, moon in dark mode, and updates on click."
      - "Verify click toggles homepage colors via scoped selector and does not require checkbox pseudo-class selectors."
      - "Inspect CSS and confirm checkbox-only blocks were removed while retained styles still support layout and tokens."
      - "Open each profile page and confirm no visual regressions from homepage theme changes."
      - "Confirm only `index.html` and `style.css` were required for implementation changes."
    acceptance_criteria:
      - "Previously added CSS-only theme toggle code is removed from homepage markup/CSS."
      - "Only necessary toggle/theme styles remain after cleanup."
      - "Homepage loads in light theme by default."
