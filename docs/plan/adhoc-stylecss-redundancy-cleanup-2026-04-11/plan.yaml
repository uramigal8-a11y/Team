      relationship: "Consumes class hooks defined in CSS; dedup must not rename selectors."
    - component: "Page templates"
      relationship: "All pages share style.css; verification must include homepage + profiles."
  integration_points:
    - "style.css selector blocks for .home-theme-toggle-button/.home-theme-icon/.home-theme-toggle-button:focus-visible"
    - "style.css legacy list/hr/reduced-motion blocks"

