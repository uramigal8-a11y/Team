    - "index.html + profile pages: read-only verification targets, no markup changes planned. [source: index.html, Myhal_Yurii/Myhal.html, Matvii_Kovalov/Kovalov.html, Sviatoslav_Lylo/Sviatoslav.html]"
  component_details:
