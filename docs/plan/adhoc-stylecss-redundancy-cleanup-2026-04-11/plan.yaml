    - scenario: "Deduping toggle/icon/focus rules accidentally changes specificity and breaks visible focus or icon swap."
      likelihood: medium
      impact: medium
      mitigation: "Keep one canonical base block and preserve dark/home-page-specific overrides and selector specificity order. [source: style.css, script.js]"
  assumptions:
    - "Current HTML contains no .team-list, .home-team-list, or <hr> nodes. [source: grep_search over **/*.html on 2026-04-11]"
    - "Homepage and profile pages rely on shared DOM contract body[data-home-theme] + one .home-theme-toggle-button per page. [source: AGENTS.md, docs/PRD.yaml]"
    - "Theme token scope and navbar width contract are sensitive and must not be refactored in this pass. [source: AGENTS.md, docs/plan/adhoc-stylecss-redundancy-audit-2026-04-11/research_findings_style_css.yaml]"

