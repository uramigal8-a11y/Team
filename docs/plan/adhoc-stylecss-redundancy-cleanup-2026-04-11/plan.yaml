      responsibility: "Delete unused .team-list/.home-team-list and hr-related rules, including reduced-motion entries that target removed selectors."
      interfaces:
        - "No public API; visual CSS only."
    - component: "Theme toggle shared styles"
      responsibility: "Consolidate duplicate .home-theme-toggle-button, .home-theme-icon, and :focus-visible blocks without changing behavior."
      interfaces:
