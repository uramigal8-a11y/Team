    - component: "Cascade safety guard"
      responsibility: "Explicitly avoid token/cascade contracts tied to .home-page and navbar width/box-sizing rules."
      interfaces:
        - "No edits in theme token blocks or navbar width contract blocks. [source: AGENTS.md]"
  dependencies:
