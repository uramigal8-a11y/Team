safe_simplification_candidates:
- selector: ".home-page .home-shell"
  lines: "style.css:158"
  action: "Remove `width: min(1080px, 100%);`"
  reason: "Immediately overridden by `width: 100%` in same rule (style.css:160)."

- selector: ".home-page .site-nav"
  lines: "style.css:183-185"
  action: "Remove entire early block containing only `margin-bottom: 20px;`"
  reason: "Later same-specificity block sets `margin: 0 auto 20px;` (style.css:266), preserving bottom margin and adding horizontal centering."

- selector: ".home-page .site-nav"
  lines: "style.css:264-265"
  action: "Remove `width: 100%` and `max-width: 1080px` from later block OR remove same properties from earlier grouped block for `.site-nav`"
  reason: "Properties are duplicates with identical computed values due to prior declaration at style.css:178-179."

- selector: ".home-page .home-cells"
  lines: "style.css:387"
  action: "Remove `display: grid` from later block"
  reason: "Already declared with same value in earlier block at style.css:203."

- selector: ".home-page .home-cells"
  lines: "style.css:204"
  action: "Remove early `gap: 24px`"
  reason: "Overridden by later `gap: 14px` at style.css:389; effective gap remains 14px."

risky_sections_to_leave_untouched:
- selector_group: ".home-page and .home-page[data-home-theme='dark'] token blocks"
  lines: "style.css:78-111 and style.css:228-250"
  risk: "Theme token parity and navbar token placement are explicitly constrained by repository notes; dedup across light/dark may break toggle behavior or navbar styling scope."

- selector_group: ".home-page .home-hero, .home-page .home-section, .home-page .site-nav shared layout block"
  lines: "style.css:174-181"
  risk: "Part of documented navbar overflow/max-width fix; moving/removing declarations requires full responsive regression check."

- selector_group: "Responsive overrides"
  lines: "style.css:416-462"
  risk: "Media-query-specific declarations intentionally diverge from base values; apparent duplication can be viewport-conditional and should remain unless tested on mobile and reduced-motion modes."

minimal_edit_strategy:
