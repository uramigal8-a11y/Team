patterns_found:
- category: structure
  pattern: "Duplicate declaration in same rule (overridden by later declaration)"
  description: "Within one ruleset, later declaration overrides earlier declaration of the same property."
  examples:
  - file: style.css
    location: "style.css:158 and style.css:160"
    snippet: "`width: min(1080px, 100%);` is overridden by later `width: 100%;` in `.home-page .home-shell`."
  prevalence: occasional

- category: structure
  pattern: "Repeated selector block with shorthand overriding prior longhand-equivalent outcome"
  description: "Same selector appears in multiple blocks; later block sets a shorthand that fully replaces prior declaration effect."
  examples:
  - file: style.css
    location: "style.css:183-185 and style.css:266"
    snippet: "Earlier `.home-page .site-nav { margin-bottom: 20px; }` is redundant because later `.home-page .site-nav { margin: 0 auto 20px; }` already sets bottom margin to 20px."
  prevalence: occasional

- category: structure
  pattern: "Repeated selector block with identical declarations"
  description: "Property/value pairs are restated later with same computed value, adding no behavioral difference."
  examples:
  - file: style.css
    location: "style.css:178-179 and style.css:264-265"
    snippet: "`.home-page .site-nav` repeats `width: 100%` and `max-width: 1080px` with identical values."
  - file: style.css
    location: "style.css:203 and style.css:387"
    snippet: "`.home-page .home-cells` repeats `display: grid` with same value."
  prevalence: occasional

- category: structure
  pattern: "Earlier declaration overridden by later declaration on same selector"
  description: "Later block for same selector changes a property value, making earlier value ineffective."
  examples:
  - file: style.css
    location: "style.css:204 and style.css:389"
    snippet: "`.home-page .home-cells` uses `gap: 24px` earlier, then `gap: 14px` later; effective value is 14px."
  prevalence: occasional

