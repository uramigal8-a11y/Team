status: completed

tldr: |
  - Confirmed one same-rule duplicate declaration: `.home-page .home-shell` declares `width` twice, with the first overridden.
  - Confirmed repeated selector blocks where later declarations fully replace earlier declarations (`.home-page .site-nav` margin handling; `.home-page .home-cells` gap/display handling).
  - Confirmed additional duplicate declarations inside repeated selector blocks (`.home-page .site-nav` width/max-width repeated with same computed values).
  - Theme token and scoped-homepage cascade areas are sensitive and should be excluded from aggressive dedup to avoid dark-theme and cross-page regressions.

