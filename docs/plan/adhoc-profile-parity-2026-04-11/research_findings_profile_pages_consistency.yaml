    snippet: ".home-page { ... }"
  - file: style.css
    location: "style.css:252"
    snippet: ".home-page .site-nav { ... }"
  prevalence: common

- category: architecture
  pattern: "Single-page JS activation guard"
  description: "Theme script binds only when both .home-page and .home-theme-toggle-button exist"
  examples:
  - file: script.js
    location: "script.js:2-8"
    snippet: "var homePage = document.querySelector('.home-page'); ... if (!homePage || !toggleButton) { return; }"
  prevalence: common

- category: structure
