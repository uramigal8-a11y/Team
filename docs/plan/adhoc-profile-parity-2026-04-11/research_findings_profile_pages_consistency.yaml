tldr: |
  - Homepage visual system is explicitly scoped under .home-page and currently only index.html opts into it (source: AGENTS.md:3, index.html:9, style.css:78).
  - Homepage navbar exists only on index and uses .site-nav with three participant links; profile pages only have a back link (source: index.html:14-18, profile HTML files around back-link section).
  - Theme toggle currently exists only on index and persists to localStorage key home-theme via script.js; profiles do not load script.js (source: index.html:10, index.html:48, script.js:4, script.js:12, script.js:21).
  - Shared global styles (body, .card, .profile-photo, links) are active on profile pages; .university class is used in two profiles but has no CSS rule in style.css (source: Kovalov.html:16-17, Myhal.html:16-17, grep no match in style.css).

