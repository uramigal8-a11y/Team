plan_id: adhoc-profile-parity-2026-04-11
objective: "Understand required work to align all profile pages with homepage styling, add profile navbars, and ensure persisted light/dark theme across navigation"
focus_area: "index + shared styles/scripts + three profile pages"
created_at: "2026-04-11"
