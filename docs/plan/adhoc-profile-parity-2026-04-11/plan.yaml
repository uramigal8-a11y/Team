plan_id: adhoc-profile-parity-2026-04-11
objective: "Make all profile pages stylistically consistent with homepage patterns, add profile navbars linking to homepage and the other two members, and make light/dark theme toggle work on every page with persisted state across navigation."
created_at: "2026-04-11"
created_by: gem-planner
status: completed
research_confidence: high

plan_metrics:
  wave_1_task_count: 2
  total_dependencies: 5
  risk_score: medium

tldr: |
  Replan keeps homepage visuals isolated under .home-page while adding a page-agnostic shared nav/theme layer.
  Scope remains minimal: shared stylesheet/script + three profile pages, with manual browser verification for cross-page theme persistence.
  Locked constraints are derived from AGENTS.md, PRD notes, and existing page/script structure.

open_questions: []

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "Theme logic remains coupled to .home-page and does not initialize on profile pages."
      likelihood: high
      impact: high
      mitigation: "Use page-agnostic DOM hooks (toggle presence + body attribute) while preserving storage key contract home-theme."
    - scenario: "Shared nav styles leak homepage-only visuals into profiles or regress homepage overflow fixes."
      likelihood: medium
      impact: high
      mitigation: "Keep homepage-only visuals in .home-page selectors and add separate shared nav/theme selectors with existing overflow guards preserved."
    - scenario: "Profile navbar routes are incorrect due to relative path mistakes."
      likelihood: medium
      impact: medium
      mitigation: "Define one route matrix and run full click-through validation from each profile page."
  assumptions:
    - "Homepage style isolation under .home-page must be preserved (source: AGENTS.md, docs/PRD.yaml)."
    - "Theme persistence key remains home-theme (source: script.js)."
    - "Project stays plain HTML/CSS/JS with one shared stylesheet style.css (source: .github/copilot-instructions.md)."
    - "Profile conventions remain unchanged: ../style.css plus .card and .university usage; no mandatory content back-link is required (source: .github/copilot-instructions.md, docs/PRD.yaml, profile HTML files)."

implementation_specification:
  code_structure: "Use two layers in existing files: (1) homepage-only layer scoped under .home-page, (2) page-agnostic shared nav/theme layer for homepage + profiles. Keep markup changes localized to profile pages and minimal homepage hook alignment only if needed."
  affected_areas:
    - "style.css"
    - "script.js"
    - "Matvii_Kovalov/Kovalov.html"
    - "Myhal_Yurii/Myhal.html"
    - "Sviatoslav_Lylo/Sviatoslav.html"
    - "index.html (only if shared hook alignment is required)"
  component_details:
    - component: "Homepage scoped visual layer"
      responsibility: "Retain existing homepage-only styling and prevent profile regressions."
      interfaces:
        - ".home-page namespace remains the owner of homepage-specific visuals"
    - component: "Shared nav/theme layer"
      responsibility: "Provide common navbar and theme-toggle behavior/styles usable across all pages without importing homepage-only visuals."
      interfaces:
        - "CSS hooks: .site-nav and .home-theme-toggle-button as shared components"
        - "JS hooks: .home-theme-toggle-button + body[data-home-theme]"
    - component: "Profile page navigation markup"
      responsibility: "Add navbar links to homepage and other two members on each profile page while preserving existing card conventions."
      interfaces:
        - "Relative links: ../index.html + two peer profile routes"
        - "No mandatory profile-content back-link; navbar links provide homepage/member navigation"
  dependencies:
    - component: "Profile page navigation markup"
      relationship: "Depends on shared nav/theme CSS contract and generalized script contract."
    - component: "Shared nav/theme layer"
      relationship: "Depends on preserving homepage scoped visual layer boundaries."
  integration_points:
    - "style.css: add shared nav/theme selectors outside .home-page; keep homepage-only visuals under .home-page"
    - "script.js: initialize/apply persisted theme on any page with expected hooks"
    - "Each profile HTML: add nav + theme toggle + script include while preserving existing profile card content conventions"

