requested_findings:
  css_only_blocks_to_remove:
  - file: index.html
    location: index.html:10-16
    exact_block: |
      <input type="checkbox" id="home-theme-toggle" class="home-theme-toggle-input">
      <label for="home-theme-toggle" class="home-theme-toggle-label">
          <span class="home-theme-icon home-theme-icon-sun" aria-hidden="true">☀</span>
          <span class="home-theme-icon home-theme-icon-moon" aria-hidden="true">🌙</span>
          <span class="home-theme-toggle-text home-theme-toggle-text-light">Режим: світла тема</span>
          <span class="home-theme-toggle-text home-theme-toggle-text-dark">Режим: темна тема</span>
      </label>
  - file: style.css
    location: style.css:92-100
    exact_block: |
      .home-page .home-theme-toggle-input {
          position: fixed;
          top: calc(16px + env(safe-area-inset-top, 0px));
          right: calc(16px + env(safe-area-inset-right, 0px));
          width: 1px;
          height: 1px;
          opacity: 0.01;
          z-index: 11;
      }
  - file: style.css
    location: style.css:124-127
    exact_block: |
      .home-page .home-theme-toggle-input:focus-visible + .home-theme-toggle-label {
          outline: 3px solid #0e639c;
          outline-offset: 3px;
      }
  - file: style.css
    location: style.css:134-156
    exact_block: |
      .home-page .home-theme-icon-moon {
          display: none;
      }

      .home-page .home-theme-toggle-text-dark {
          display: none;
      }

      .home-page .home-theme-toggle-input:checked + .home-theme-toggle-label .home-theme-icon-sun {
          display: none;
      }

      .home-page .home-theme-toggle-input:checked + .home-theme-toggle-label .home-theme-icon-moon {
          display: inline;
      }

      .home-page .home-theme-toggle-input:checked + .home-theme-toggle-label .home-theme-toggle-text-light {
          display: none;
      }

      .home-page .home-theme-toggle-input:checked + .home-theme-toggle-label .home-theme-toggle-text-dark {
          display: inline;
      }
  - file: style.css
    location: style.css:202-226
    exact_block: |
      .home-page .home-theme-toggle-input:checked ~ .home-shell {
          --home-bg: #0a0a0a;
          --home-surface: #141414;
          --home-surface-soft: #1d1d1d;
          --home-text: #f5f5f5;
          --home-muted: #cccccc;
          --home-border: #3a3a3a;
          --home-focus: #ffffff;
          --home-card-bg: linear-gradient(135deg, #131313 0%, #0f0f0f 100%);
          --home-link-hover-bg: #252525;
          --home-link-hover-border: #585858;
          --home-cell-bg: #1a1a1a;
          --home-cell-title: #f5f5f5;
          --home-cell-text: #cccccc;
          --home-page-glow-1: rgba(27, 27, 27, 0.9);
          --home-page-glow-2: rgba(32, 32, 32, 0.9);
          --home-shadow: 0 16px 36px rgba(0, 0, 0, 0.45);
      }

      .home-page .home-theme-toggle-input:checked + .home-theme-toggle-label {
          border-color: #4a4a4a;
          background: rgba(19, 19, 19, 0.96);
          color: #f5f5f5;
          box-shadow: 0 10px 24px rgba(0, 0, 0, 0.4);
      }
  - file: style.css
    location: style.css:349-352
    exact_block: |
      .home-page .home-theme-toggle-input {
          top: calc(12px + env(safe-area-inset-top, 0px));
          right: calc(12px + env(safe-area-inset-right, 0px));
      }

  minimal_structure_to_keep_for_js_top_right_toggle:
  - file: index.html
    location: index.html:11-16
    required_markup_elements:
      - "One visible top-right control element with class hook equivalent to `.home-theme-toggle-label` for existing positioning styles."
      - "Two icon spans (`.home-theme-icon-sun`, `.home-theme-icon-moon`) for JS-driven swap."
      - "One persistent text span (can replace dual light/dark text spans) for accessible state label."
  - file: style.css
    location: style.css:102-122
    required_css_block: |
      .home-page .home-theme-toggle-label {
          position: fixed;
          top: calc(12px + env(safe-area-inset-top, 0px));
          right: calc(12px + env(safe-area-inset-right, 0px));
          z-index: 10;
          display: inline-flex;
          align-items: center;
          gap: 8px;
          padding: 10px 14px;
          min-width: 44px;
          min-height: 44px;
          box-sizing: border-box;
          border-radius: 999px;
          border: 1px solid #bfd0e0;
          background: rgba(255, 255, 255, 0.95);
          color: #153047;
          font-size: 14px;
          font-weight: 600;
          cursor: pointer;
          box-shadow: 0 8px 20px rgba(20, 52, 84, 0.14);
      }

  safest_js_integration_approach_in_index_html:
  source_basis:
  - "No existing script tags in index (index.html:1-59)."
  - "No `.js` files in workspace search (`file_search` for `**/*.js` returned none)."
  - "Default light theme tokens are already defined in `.home-page .home-shell` (style.css:158-189)."
  approach:
  - "Keep default HTML/CSS in light mode (no dark class/attribute in initial markup)."
  - "Add one small script near end of body that toggles a homepage-scoped state hook on `body.home-page` (for example, class or data attribute) after click on top-right control."
  - "Drive icon swap from JS by toggling `hidden`/`aria-hidden` on sun/moon spans; keep one visible text label synchronized with current mode."
  - "Store selected mode in localStorage and on load: apply stored dark mode before first paint when possible; if missing/invalid, keep light mode."
  - "Keep all selectors homepage-scoped (`.home-page ...`) to preserve profile rendering."

  selectors_that_must_remain_homepage_scoped:
  - selector: ".home-page .home-shell and its custom properties"
    location: style.css:158-189
    reason: "These variables color homepage cards/sections; globalizing can alter shared `.card`, heading, and link behavior on profile pages."
  - selector: ".home-page .card"
    location: style.css:228-237
    reason: "Overrides shared `.card` dimensions/background; removing scope would restyle profile cards."
  - selector: ".home-page h1, .home-page h2, .home-page h3, .home-page p"
    location: style.css:239-244
    reason: "Homepage text-color token injection should not leak to profile typography."
  - selector: ".home-page .home-team-list* and .home-page .home-cell*"
    location: style.css:270-333
    reason: "Homepage list/cell structure is unique; global scope could affect generic `.team-list` patterns."
  - selector: ".home-page a:focus-visible"
    location: style.css:335-338
    reason: "Homepage-specific focus token should not override focus styling globally."
  - selector: "All top-right toggle selectors"
    location: style.css:92-156, 221-226, 349-360
    reason: "Toggle UI exists only on homepage; global selectors would introduce orphan styles on profile pages."

