plan_id: adhoc-theme-toggle-2026-04-11
objective: "Inspect current homepage theme-toggle markup/CSS and map safe migration path from CSS-only toggle to JS-controlled top-right button."
focus_area: homepage_theme_toggle_inventory
created_at: "2026-04-11"
created_by: gem-researcher
status: completed

tldr: |
  - Current theme behavior is CSS-only and driven by a checkbox + label block in homepage markup, plus `:checked` sibling selectors in shared CSS.
  - Theme variables are declared on `.home-page .home-shell` and switched by `.home-theme-toggle-input:checked ~ .home-shell`; icon/text swap is also CSS-driven via `:checked + label` selectors.
  - Homepage safety depends on keeping selectors under `.home-page`; this aligns with existing repo guidance that homepage styles must remain scoped.
  - There is no JS file or script tag in the workspace, so any JS toggle integration is a new behavior surface.
  - Exact removable CSS-only blocks and minimal keep-structure for JS migration are enumerated below with file/line references.

