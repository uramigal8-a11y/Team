plan_id: adhoc-theme-toggle-2026-04-11
objective: "Add a CSS-only light/dark theme toggle to the homepage with default light mode, a top-right checkbox-and-label control, homepage-scoped variables, and explicit back-navigation behavior without impacting profile pages."
created_at: "2026-04-11"
created_by: gem-planner
status: pending
research_confidence: high

plan_metrics:
  wave_1_task_count: 1
  total_dependencies: 0
  risk_score: medium

tldr: |
  - Scope is homepage-only and stays within the existing static-site pattern: HTML5 and CSS3 only, with no JavaScript.
  - The toggle should default to light mode, use a top-right accessible checkbox + label pattern, and swap a sun icon for a moon icon through CSS state only.
  - Theme styles and variables must remain scoped under `.home-page`; no global selectors or `:root` overrides are allowed.
  - The checkbox must stay focusable, the visible toggle must keep persistent accessible text, and keyboard focus-visible styling is required.
  - Fresh navigation to `index.html` resets to light theme, while bfcache or history restoration may preserve the last chosen state and is acceptable.

open_questions: []

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "The checkbox is hidden with display:none or otherwise removed from the tab order, so the theme control cannot be focused or activated by keyboard users."
      likelihood: medium
      impact: high
      mitigation: "Keep the input focusable and verify tab navigation and keyboard activation before sign-off."
    - scenario: "The checkbox + label control is visually present but lacks a clear accessible name, keyboard focus treatment, or usable hit area."
      likelihood: medium
      impact: high
      mitigation: "Require a labeled control, visible focus styling, and a keyboard-check verification pass before sign-off."
    - scenario: "Theme selectors leak outside the homepage and change profile page visuals because the shared stylesheet is reused everywhere."
      likelihood: medium
      impact: high
      mitigation: "Keep all theme-specific selectors and variables under the existing `.home-page` scope and avoid changing shared profile-page class behavior."
    - scenario: "The sun/moon icon swap or color variables are incorrect, so the default light theme or dark-state contrast is misleading."
      likelihood: medium
      impact: medium
      mitigation: "Validate the default state, the checked state, and contrast in both themes against the shared palette before finalizing."
    - scenario: "The toggle placement overlaps content or becomes hard to use on smaller screens."
      likelihood: low
      impact: medium
      mitigation: "Place the control in the homepage header area with responsive positioning and verify it at narrow widths."
  assumptions:
    - "Fresh navigation to index.html must start in light mode because there is no JavaScript-based persistence."
    - "bfcache or history restoration may preserve the last chosen state and that behavior is acceptable."
    - "A full reload resets the homepage theme back to light mode."
    - "The checkbox/label pattern can carry both the interactive control and the icon swap without adding new files."
    - "Profile pages remain unchanged except for inheriting the existing shared stylesheet as they do now."

implementation_specification:
