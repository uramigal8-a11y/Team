  affected_areas:
    - "index.html"
    - "style.css"
  component_details:
    - component: "Homepage theme control"
      responsibility: "Provide the accessible checkbox, persistent visible text label, and top-right placement needed to switch the homepage between light and dark modes without JavaScript while keeping the input in the tab order."
      interfaces:
        - "Homepage-only checkbox control in the top-right corner"
        - "Label text/icon pair that exposes a clear accessible name and remains visible"
        - "Checkbox state used by CSS selectors to switch themes"
        - "Focusable input that is not hidden with display:none"
    - component: "Homepage theme styling"
      responsibility: "Provide light and dark color palettes, toggle appearance, focus-visible states, and layout-safe positioning without affecting profile pages."
      interfaces:
        - "CSS rules scoped under `.home-page`"
        - "Theme-specific variables or selectors that do not use `:root` or global overrides"
        - "Visible focus-visible styling for keyboard users"
    - component: "Existing homepage content shell"
      responsibility: "Preserve the current hero, profile links, and team description cards while accommodating the new control."
      interfaces:
        - "Existing homepage structure and relative profile links"
        - "Ukrainian visible copy already present in the homepage"
  dependencies:
    - component: "Homepage theme control"
      relationship: "Provides the checked state that the styling layer reads."
    - component: "Homepage theme styling"
      relationship: "Consumes the state set by the control."
    - component: "Existing homepage content shell"
      relationship: "Uses the same layout and link structure, with only a small control added."
  integration_points:
    - "The toggle is added to the homepage itself, not to profile pages."
    - "The shared style.css continues to serve both homepage and profile pages, but theme rules and variables are isolated to `.home-page`."
    - "No navigation targets in the existing homepage link list should change."
    - "The control must keep its accessible name, focus-visible styling, and tab focus behavior intact in both theme states."
    - "Fresh loads of index.html default to light theme, while restored history entries may retain their prior checked state."

