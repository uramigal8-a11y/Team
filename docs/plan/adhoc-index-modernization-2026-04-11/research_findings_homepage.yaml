plan_id: adhoc-index-modernization-2026-04-11
objective: "Inspect the current homepage structure and styling constraints for a potential theme toggle."
focus_area: homepage
created_at: "2026-04-11"
created_by: gem-researcher
status: completed

tldr: |
  - Current `index.html` uses a `body.home-page` wrapper and a `main.home-shell` with three sections: hero, profile links, and team description cards.
  - Shared styling still includes global selectors for `body`, `h1`, `p`, `a`, and `.card`, plus homepage-scoped rules under `.home-page` that isolate the newer homepage look.
  - There is no existing JavaScript, no `<script>` tags, and no `.js` files in the workspace, so any theme toggle would be a new script surface.
  - The safest insertion point for a toggle is the homepage shell, because the homepage already has scoped classes and does not need profile-page layout changes.
  - A toggle that needs state persistence or icon swapping will require JS; CSS-only changes can cover colors but not durable theme state.

