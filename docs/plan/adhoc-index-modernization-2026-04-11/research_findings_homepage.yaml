plan_id: adhoc-index-modernization-2026-04-11
objective: "Modernize homepage index.html with monochrome style and add team description cards (research only)."
focus_area: homepage
created_at: "2026-04-11"
created_by: gem-researcher
status: completed

tldr: |
  - Current homepage is a single centered `.card` containing intro text, `<hr>`, and a `.team-list` with 3 profile links in `index.html:11-29`.
  - Shared stylesheet defines global element styles (`body`, `h1`, `p`, `a`, `hr`) and key reusable classes (`.card`, `.team-list`, `.profile-photo`) in `style.css:2-75`.
  - Profile pages also depend on `.card` and global typography/link styles via `../style.css`, so broad selector changes can unintentionally alter all profile pages.
  - Profile links currently use relative paths that match existing file structure and must remain unchanged to avoid navigation regressions.
  - Safe modernization path is to add homepage-scoped wrapper/classes in HTML and style them in CSS without changing existing profile URL targets.

