implementation_plan_snapshot:
  summary: "Safe HTML+CSS modernization plan for monochrome homepage with description cards while preserving links and shared constraints."
  html_steps:
  - "Keep `<html lang=\"uk\">` and existing profile href values unchanged in `index.html` (`Myhal_Yurii/Myhal.html`, `Matvii_Kovalov/Kovalov.html`, `Sviatoslav_Lylo/Sviatoslav.html`)."
  - "Wrap homepage content in a homepage-specific parent class (for example, a section around existing `.card`) to scope new styles to index only."
  - "Retain existing `.team-list` list structure for link stability; inside each `<li>`, keep `<a>` and add short placeholder description paragraph/block beneath the link text."
  - "Optionally add separate monochrome info cards block below intro (2-3 cards) using new classes dedicated to homepage only (e.g., card grid + card item classes)."
  css_steps:
  - "Introduce CSS variables for monochrome palette (`--bg`, `--surface`, `--text`, `--muted`, `--border`) using black/white/grays."
  - "Create homepage-scoped selectors (e.g., `.home-page ...`) instead of changing global `body`, `h1`, `p`, `a` directly."
  - "Style team list items/cards with subtle border, radius, and non-color-dependent hover (shadow/translate with grayscale only)."
  - "Add responsive grid/flex rules for new description cards and list spacing so layout remains usable on mobile widths."
  link_safety_checks:
  - "Do not rename member folders/files or change href strings in homepage list."
  - "Do not alter `../index.html` backlinks in profile pages."
  - "Do not replace shared class names used by profile pages (`.card`, `.profile-photo`, `.university`) unless scoped override is homepage-only."
