    - component: "Navbar parity contract"
      responsibility: "Align participant navbar container behavior with homepage constraints through measurable token/sizing/breakpoint rules."
      interfaces:
        - "CSS token/contract: --home-layout-max-width = 1080px (or equivalent shared constant used by both .site-nav and .home-page .site-nav)"
        - "CSS contract: box-sizing: border-box on nav container and nav links for homepage and participant contexts"
        - "Breakpoint contract: explicit behavior for <=480px and >480px widths"
    - component: "Toggle placement and touch-target contract"
