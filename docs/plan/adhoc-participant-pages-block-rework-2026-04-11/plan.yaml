    - component: "CSS specificity/conflict audit"
      responsibility: "Prevent homepage regressions by validating selector scope/specificity interactions after new participant-page rules."
      interfaces:
        - "Audit checklist: selector scope boundaries (.home-page vs body:not(.home-page))"
        - "Audit checklist: duplicate/overriding selector collisions affecting .site-nav/.home-theme-toggle-button"
  dependencies:
    - component: "Semantic 4-block profile template"
      relationship: "Depends on style.css class hooks and spacing/typography definitions from CSS task."
    - component: "Toggle placement and touch-target contract"
      relationship: "Depends on script.js theme contract and shared toggle class usage."
    - component: "CSS specificity/conflict audit"
      relationship: "Depends on completed CSS and HTML changes to assess cross-page impact."
  integration_points:
