tldr: |
  Revised replan preserves scope to shared stylesheet plus three participant pages and documentation touchpoints (source: user request; workspace tree).
  Navbar parity is now defined as a measurable contract around the shared 1080px width guardrail, border-box sizing, and breakpoint behavior (source: style.css:78-87, style.css:327-330, style.css:572).
  Theme-toggle mobile safety checks are now explicit at 320px and 375px widths with non-overlap, 44x44 minimum hit target, safe-area offsets, and z-index expectations (source: style.css:121-129, style.css:265-268, style.css:572-591).
  Semantic profile structure is now a strict 4-block HTML contract with required classes and landmarks to avoid divergence across participant pages (source: user request).

