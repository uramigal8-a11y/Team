    - component: "Semantic 4-block profile template"
      responsibility: "Standardize participant content into one required landmark/class structure across all profile pages."
      interfaces:
        - "Landmark: <main class=\"profile-main\">"
        - "Block 1: <section class=\"profile-block profile-intro\"> with .profile-intro-media and .profile-intro-identity"
