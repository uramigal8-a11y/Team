  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "Participant-page navbar parity changes leak into homepage and reintroduce width/overflow regressions."
      likelihood: medium
      impact: high
      mitigation: "Keep homepage rules under .home-page intact and require a specificity/conflict audit before completion (source: AGENTS.md; PRD decisions)."
    - scenario: "Top-right toggle overlaps navbar links on narrow viewports, reducing usability."
      likelihood: medium
      impact: high
      mitigation: "Add mandatory 320px/375px overlap checks, enforce minimum 44x44 target, and verify z-index ordering and safe-area offsets."
    - scenario: "Profile HTML diverges between pages due to loosely defined section structure."
      likelihood: medium
      impact: medium
      mitigation: "Use one strict landmark/class template for all participant pages and verify class presence and order on all three files."
  assumptions:
    - "Tech stack stays plain HTML5/CSS3/JavaScript with one shared stylesheet style.css (source: .github/copilot-instructions.md)."
    - "Theme runtime contract remains body[data-home-theme] + one .home-theme-toggle-button per page (source: AGENTS.md; docs/PRD.yaml; script.js)."
    - "Homepage scoping constraint under .home-page remains mandatory to avoid cross-page regressions (source: AGENTS.md; docs/PRD.yaml notes)."
    - "Shared navbar baseline currently uses max-width 1080px and border-box; parity should align participant nav with this guardrail, not 440px profile-only narrowing (source: style.css:84, style.css:87, style.css:203)."

