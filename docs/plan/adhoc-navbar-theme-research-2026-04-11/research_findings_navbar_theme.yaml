plan_id: adhoc-navbar-theme-research-2026-04-11
objective: "Identify why navbar does not fully work with light/dark themes and what files need changes"
focus_area: "homepage navbar + theme toggle"
created_at: "2026-04-11"
created_by: "gem-researcher"
status: completed

tldr: |
  - Navbar markup exists only on homepage in index.html, with .site-nav placed as a sibling before .home-shell (source: index.html:14, index.html:20).
  - Theme variables are declared on .home-page .home-shell, while navbar links consume var(--home-text) outside that scope, so link color token is unresolved on navbar (source: style.css:136, style.css:269-270).
  - Theme toggling uses data-home-theme on body.home-page and localStorage key home-theme (source: script.js:2-4, script.js:30).
  - Navbar container and hover colors use fixed rgba white values instead of theme tokens, causing incomplete adaptation between light/dark states (source: style.css:259, style.css:288).
  - Profile pages do not include navbar/theme-toggle markup and currently rely on global styles; homepage-scoped changes remain low-risk if .home-page scoping is preserved (source: Myhal_Yurii/Myhal.html:1-27, Matvii_Kovalov/Kovalov.html:1-27, Sviatoslav_Lylo/Sviatoslav.html:1-22, AGENTS.md:1-3).

