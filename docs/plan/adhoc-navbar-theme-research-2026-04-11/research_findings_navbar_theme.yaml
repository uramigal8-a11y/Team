requested_analysis:
  navbar_structure_and_selectors:
  - "HTML: body.home-page contains button.home-theme-toggle-button, then nav.site-nav with three links (index.html:9-18)."
  - "CSS selectors: .home-page .site-nav (style.css:252), .home-page .site-nav a (style.css:269), hover/focus selectors at style.css:286-289."
  theme_toggle_mechanism:
  - "Theme key: localStorage['home-theme'] with allowed values dark/light (script.js:4,12-13)."
  - "Applied state: data-home-theme on body.home-page (script.js:30)."
  - "Dark-state selectors use [data-home-theme='dark'] descendants in CSS (style.css:128,223,242)."
  exact_incompatibilities:
  - "Token scope mismatch: --home-text defined on .home-shell (style.css:136,140) but navbar links use var(--home-text) outside that scope (style.css:269-270), causing unresolved variable and fallback to inherited/global link color (style.css:36-38)."
  - "Navbar container and hover visuals use fixed rgba white values (style.css:259,288) rather than theme tokens, so adaptation is partial between light/dark states."
  - "Dark toggle-button block includes grid-template-columns (style.css:247), unrelated to button and likely unintended; indicates potential style-state contamination risk."
  minimal_safe_change_list:
  - file: "style.css"
    change_scope: "theme token scope + navbar tokenization"
    rationale: "Move or duplicate core --home-* variables to .home-page (and dark override to .home-page[data-home-theme='dark']) so nav siblings resolve tokens; replace hardcoded nav rgba colors with token-based values."
  - file: "style.css"
    change_scope: "cleanup misplaced declaration"
    rationale: "Remove/relocate grid-template-columns from dark toggle-button rule to avoid unrelated layout side effects."
  - file: "index.html"
    change_scope: "optional structural alignment"
    rationale: "Alternative minimal fix is moving nav.site-nav inside .home-shell so existing token scope applies without broadening variable root."
  profile_regression_risks:
  - "High if selectors are de-scoped from .home-page or global a/.card rules are changed; profiles rely on shared style.css and have no homepage classes (Myhal_Yurii/Myhal.html:1-27, Matvii_Kovalov/Kovalov.html:1-27, Sviatoslav_Lylo/Sviatoslav.html:1-22)."
  - "Low for homepage-only selectors that stay under .home-page, consistent with AGENTS guidance (AGENTS.md:1-3)."
