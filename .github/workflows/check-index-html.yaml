name: Check Index HTML Myhal Jura

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Гілка для запуску'
        required: true
        default: 'Myhal_Jura_Actions'
  push:
    branches:
      - main
      - Myhal_Jura_Actions

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout потрібної гілки
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_branch || github.ref_name }}
          token: ${{ secrets.MY_PERSONAL_TOKEN }}
          fetch-depth: 0

      - name: Run check script
        run: bash check_index.sh

      - name: Update README if index.html exists
        if: env.FOUND == 'true'
        run: |
          BRANCH=${{ github.event.inputs.target_branch || github.ref_name }}

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin $BRANCH
          git checkout -B $BRANCH origin/$BRANCH

          touch README.md
          echo "Branch: $BRANCH | index.html exists ✅" >> README.md

          git add README.md
          if ! git diff --cached --quiet; then
            git commit -m "Автоматичне оновлення README ($BRANCH)"
            git push origin $BRANCH
          fi